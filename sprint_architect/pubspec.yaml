name: sprint_architect
description: "Sprintura - AI-Powered Productivity App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.3.5
  http: ^1.3.0
  google_mobile_ads: ^5.3.0
  flutter_local_notifications: ^18.0.1
  vibration: ^2.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  lottie: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#020b43"
  adaptive_icon_foreground: "assets/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
